<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindShift | Giải pháp AI Doanh nghiệp & Tự động hóa Quy trình</title>
    <meta name="description" content="MindShift cung cấp hệ điều hành AI tối ưu cho Lead Generation, Đào tạo số hóa và Quản trị tri thức doanh nghiệp." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
              colors: {
                brand: {
                  50: "#f0f0ff",
                  100: "#e1e1ff",
                  200: "#c7c7ff",
                  300: "#a3a3ff",
                  400: "#7a7aff",
                  500: "#512FEB", 
                  600: "#4024c7",
                  700: "#321d9c",
                  800: "#2a197d",
                  900: "#251768",
                },
                accent: {
                  purple: "#8b5cf6",
                  cyan: "#06b6d4",
                  rose: "#f43f5e",
                },
              },
              fontFamily: {
                sans: ['Inter', 'system-ui', 'sans-serif'],
                display: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
                serif: ['Instrument Serif', 'serif'],
              },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              }
            }
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Inter:ital,wght@0,100..900;1,100..900&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        scroll-behavior: smooth;
        --brand: #512FEB;
      }
      body {
        background-color: #050508;
        color: #ffffff;
        overflow-x: hidden;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .font-display {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      ::selection {
        background-color: rgba(81, 47, 235, 0.4);
        color: #ffffff;
      }
      .glass {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(32px) saturate(180%);
        -webkit-backdrop-filter: blur(32px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .glass-card {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.07);
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .glass-card:hover {
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.6), 0 0 50px rgba(81, 47, 235, 0.15);
        transform: translateY(-8px);
      }
      .font-serif-italic {
        font-family: 'Instrument Serif', serif;
        font-style: italic;
      }
      .bg-mesh {
        background: 
          radial-gradient(at 0% 0%, rgba(81, 47, 235, 0.18) 0, transparent 45%),
          radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.12) 0, transparent 45%),
          radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.12) 0, transparent 45%),
          radial-gradient(at 0% 100%, rgba(244, 63, 94, 0.08) 0, transparent 45%);
        background-attachment: fixed;
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { 
        background: linear-gradient(to bottom, #512FEB, #8b5cf6); 
        border-radius: 20px;
        border: 2px solid #000;
      }
      ::-webkit-scrollbar-thumb:hover { background: #a3a3ff; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://esm.sh/react@^19.2.3/",
          "react": "https://esm.sh/react@^19.2.3",
          "recharts": "https://esm.sh/recharts@^3.6.0",
          "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
          "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
          "framer-motion": "https://esm.sh/framer-motion@^11.0.0"
        }
      }
    </script>
  </head>
  <body class="bg-mesh">
    <div id="root"></div>
    <script type="module" src="/vi.tsx"></script>
  </body>
</html>
