<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindShift | Specialized Enterprise AI Solutions</title>
    <meta name="description" content="MindShift provides specialized AI products for businesses, including MindCoach for corporate learning and MindScout for B2B lead generation." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
              colors: {
                brand: {
                  50: "#f0f0ff",
                  100: "#e1e1ff",
                  200: "#c7c7ff",
                  300: "#a3a3ff",
                  400: "#7a7aff",
                  500: "#512FEB", 
                  600: "#4024c7",
                  700: "#321d9c",
                  800: "#2a197d",
                  900: "#251768",
                },
                accent: {
                  purple: "#8b5cf6",
                  cyan: "#06b6d4",
                  rose: "#f43f5e",
                },
              },
              fontFamily: {
                sans: ['Inter', 'system-ui', 'sans-serif'],
                display: ['Outfit', 'Inter', 'system-ui', 'sans-serif'],
                serif: ['Instrument Serif', 'serif'],
              },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              }
            }
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Outfit:wght@400;600;700;800;900&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
      html {
        font-size: 100%;
      }
      @media (min-width: 1024px) {
        html {
          font-size: 90%;
        }
      }
      :root {
        scroll-behavior: smooth;
      }
      body {
        background-color: #000000;
        color: #ffffff;
        overflow-x: hidden;
        font-family: 'Inter', sans-serif;
      }
      ::selection {
        background-color: rgba(81, 47, 235, 0.3);
        color: #ffffff;
      }
      .glass {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      .glass-glow {
        border: 1px solid rgba(81, 47, 235, 0.2);
        box-shadow: 0 0 30px rgba(81, 47, 235, 0.1);
      }
      .text-gradient {
        background: linear-gradient(135deg, #512FEB 0%, #8b5cf6 50%, #f43f5e 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .bg-mesh {
        background-image: 
          radial-gradient(at 0% 0%, rgba(81, 47, 235, 0.15) 0, transparent 40%), 
          radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.1) 0, transparent 40%), 
          radial-gradient(at 50% 100%, rgba(81, 47, 235, 0.1) 0, transparent 50%);
        background-attachment: fixed;
      }
      .font-serif-italic {
        font-family: 'Instrument Serif', serif;
        font-style: italic;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: #512FEB; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://esm.sh/react@^19.2.3/",
          "react": "https://esm.sh/react@^19.2.3",
          "recharts": "https://esm.sh/recharts@^3.6.0",
          "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
          "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
          "framer-motion": "https://esm.sh/framer-motion@^11.0.0"
        }
      }
    </script>
  </head>
  <body class="bg-mesh">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
